spring:
  application:
    name: merchanthub-backend

  # Runtime datasource — connects as the RESTRICTED, RLS-subject app role.
  datasource:
    url: ${DB_APP_URL:jdbc:postgresql://localhost:5432/merchanthub}
    username: ${DB_APP_USER:merchanthub_app}
    password: ${DB_APP_PASSWORD:merchanthub_app_pw}
    hikari:
      maximum-pool-size: 10
      pool-name: merchanthub-app-pool

  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Flyway connects as ADMIN (superuser) to create extensions, tables, RLS,
  # functions and seed data — things the restricted runtime role cannot do.
  flyway:
    enabled: true
    url: ${DB_ADMIN_URL:jdbc:postgresql://localhost:5432/merchanthub}
    user: ${DB_ADMIN_USER:postgres}
    password: ${DB_ADMIN_PASSWORD:postgres}
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always

# Application-specific configuration
merchanthub:
  # Supabase JWT secret (HS256). Validates inbound tokens AND signs dev tokens.
  jwt-secret: ${SUPABASE_JWT_SECRET:super-secret-dev-jwt-signing-key-change-me-please-32b}
  # Accepted issuer/audience are not strictly enforced for the local demo.
  dev-auth-enabled: ${DEV_AUTH_ENABLED:true}
  webhook-secret: ${WEBHOOK_SECRET:dev-webhook-hmac-secret-change-me}
  shop-api-base-url: ${SHOP_API_BASE_URL:http://localhost:4000}
  sync-interval-ms: ${SYNC_INTERVAL_MS:300000}
  # CORS origins allowed to call the API (the Next.js dashboard).
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.merchanthub: INFO
